services:
  tdr-bot:
    extends:
      file: ../../infra/deploy.dev.base.yml
      service: dev-base

    environment:
      PACKAGE_NAME: tdr-bot

    env_file:
      - ../../infra/.env.tdr-bot

    volumes:
      - /var/run/docker.sock:/var/run/docker.sock

    labels:
      - traefik.enable=true
      - traefik.http.routers.tdr.rule=Host(`tdr.localhost`)
      - traefik.http.services.tdr.loadbalancer.server.port=8080
