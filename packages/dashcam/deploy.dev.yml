services:
  dashcam:
    extends:
      file: ../../infra/deploy.dev.base.yml
      service: dev-base

    environment:
      PACKAGE_NAME: dashcam

    labels:
      - traefik.enable=true
      - traefik.http.routers.dashcam.rule=Host(`dashcam.localhost`)
      - traefik.http.services.dashcam.loadbalancer.server.port=8080
