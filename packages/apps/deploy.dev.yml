services:
  apps:
    extends:
      file: ../../infra/deploy.dev.base.yml
      service: dev-base

    environment:
      PACKAGE_NAME: apps

    volumes:
      - /var/run/docker.sock:/var/run/docker.sock

    labels:
      - traefik.enable=true
      - traefik.http.routers.apps.rule=Host(`apps.localhost`)
      - traefik.http.services.apps.loadbalancer.server.port=8080
