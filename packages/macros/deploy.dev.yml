services:
  macros:
    extends:
      file: ../../infra/deploy.dev.base.yml
      service: dev-base

    environment:
      PACKAGE_NAME: macros

    labels:
      - traefik.enable=true
      - traefik.http.routers.macros.rule=Host(`macros.localhost`)
      - traefik.http.services.macros.loadbalancer.server.port=8080
