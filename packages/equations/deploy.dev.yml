services:
  equations:
    extends:
      file: ../../infra/deploy.dev.base.yml
      service: dev-base

    environment:
      PACKAGE_NAME: equations

    env_file:
      - ../../infra/.env.equations

    labels:
      - traefik.enable=true
      - traefik.http.routers.equations.rule=Host(`equations.localhost`)
      - traefik.http.services.equations.loadbalancer.server.port=8080
