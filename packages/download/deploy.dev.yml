services:
  download:
    extends:
      file: ../../infra/deploy.dev.base.yml
      service: dev-base

    environment:
      PACKAGE_NAME: download

    env_file:
      - ../../infra/.env.download

    labels:
      - traefik.enable=true
      - traefik.http.routers.download.rule=Host(`download.localhost`)
      - traefik.http.services.download.loadbalancer.server.port=8080
