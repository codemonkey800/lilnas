services:
  sync-db:
    image: postgres:16-alpine
    environment:
      POSTGRES_INITDB_ARGS: '--data-checksums'
    env_file:
      - ../../infra/.env.sync
    volumes:
      - /storage/app-data/sync/db:/var/lib/postgresql/data
    healthcheck:
      # Use $$ to defer variable interpolation to container runtime
      test: pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB
      interval: 30s
      start_interval: 10s
      start_period: 30s
    command:
      - postgres
      - -c
      - shared_buffers=256MB
      - -c
      - wal_compression=on
    restart: unless-stopped

  sync:
    build:
      context: ../..
      dockerfile: packages/sync/Dockerfile
    restart: unless-stopped
    env_file:
      - ../../infra/.env.sync
    depends_on:
      sync-db:
        condition: service_healthy
    labels:
      - traefik.enable=true
      - traefik.http.routers.sync.rule=Host(`sync.lilnas.io`)
      - traefik.http.routers.sync.entrypoints=websecure
      - traefik.http.routers.sync.tls.certresolver=le
      - traefik.http.routers.sync.middlewares=forward-auth
      - traefik.http.services.sync.loadbalancer.server.port=8080
