services:
  tdr-code:
    image: nginx:alpine
    restart: unless-stopped
    # Give the main server up to 30s to SIGTERM the bot child, reap it,
    # and close the WAL handle cleanly on `docker-compose down`.
    stop_grace_period: 30s
    networks:
      - lilnas-proxy
    extra_hosts:
      - 'host.docker.internal:host-gateway'
    volumes:
      - ./deploy/nginx.conf:/etc/nginx/conf.d/default.conf:ro
      - ./deploy/unreachable.html:/usr/share/nginx/html/unreachable.html:ro
      # SQLite WAL data directory.
      # One-time host setup (run before first boot):
      #   sudo chown 1000:1000 /storage/app-data/tdr-code
      #   sudo chmod 700 /storage/app-data/tdr-code
      # Without chown the process can't open the DB on first boot.
      - /storage/app-data/tdr-code:/data
    # Liveness probe via Next (:8080) → /api/health rewrite → main server.
    # main server now binds 127.0.0.1:8082 (loopback-only); the container
    # cannot reach it directly. Route through Next (:8080), which rewrites
    # /api/* → localhost:8082 — still exercises the main-server event loop.
    healthcheck:
      test:
        [
          'CMD-SHELL',
          "node -e \"const h=require('http');h.get('http://host.docker.internal:8080/api/health',r=>process.exit(r.statusCode===200?0:1)).on('error',()=>process.exit(1))\"",
        ]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 30s
    labels:
      - traefik.enable=true
      - traefik.docker.network=lilnas-proxy
      - traefik.http.routers.tdr-code.rule=Host(`tdr-code.lilnas.io`)
      - traefik.http.routers.tdr-code.entrypoints=websecure
      - traefik.http.routers.tdr-code.tls.certresolver=le
      - traefik.http.services.tdr-code.loadbalancer.server.port=80

networks:
  lilnas-proxy:
    external: true
