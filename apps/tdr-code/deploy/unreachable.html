<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Server Unreachable — tdr-code</title>
    <style>
      *,
      *::before,
      *::after {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
      }

      body {
        background: #0a0a0a;
        color: #e5e5e5;
        font-family:
          'Inter',
          -apple-system,
          BlinkMacSystemFont,
          'Segoe UI',
          sans-serif;
        display: flex;
        align-items: center;
        justify-content: center;
        min-height: 100vh;
        padding: 2rem;
      }

      .container {
        text-align: center;
        max-width: 480px;
      }

      .icon {
        font-size: 3rem;
        margin-bottom: 1.5rem;
        opacity: 0.4;
      }

      h1 {
        font-size: 1.25rem;
        font-weight: 600;
        color: #fafafa;
        margin-bottom: 0.5rem;
        letter-spacing: -0.01em;
      }

      p {
        font-size: 0.9rem;
        color: #737373;
        line-height: 1.6;
      }

      .badge {
        display: inline-block;
        margin-top: 1.5rem;
        padding: 0.25rem 0.75rem;
        background: #1a1a1a;
        border: 1px solid #262626;
        border-radius: 9999px;
        font-size: 0.75rem;
        color: #525252;
        font-family: 'JetBrains Mono', 'Fira Code', monospace;
      }
    </style>
  </head>
  <body>
    <div class="container">
      <div class="icon">⚡</div>
      <h1>Dev server is not running</h1>
      <p>
        The tdr-code backend is unreachable. Start the dev server and
        refresh.
      </p>
      <span class="badge">502 upstream unreachable</span>
    </div>
  </body>
</html>
