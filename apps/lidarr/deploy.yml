services:
  lidarr:
    build:
      context: ../..
      dockerfile: apps/lidarr/Dockerfile
    restart: unless-stopped
    env_file:
      - ../../infra/.env.lidarr
    healthcheck:
      test: ['CMD', 'wget', '-qO-', 'http://localhost:8080/health']
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 15s
    labels:
      - traefik.enable=true
      - traefik.http.routers.lidarr.rule=Host(`lidarr.lilnas.io`)
      - traefik.http.routers.lidarr.entrypoints=websecure
      - traefik.http.routers.lidarr.tls.certresolver=le
      - traefik.http.services.lidarr.loadbalancer.server.port=8080
