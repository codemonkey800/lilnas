services:
  lidarr:
    build:
      context: ../..
      dockerfile: apps/lidarr/Dockerfile
    restart: unless-stopped
    env_file:
      - ../../infra/.env.lidarr
    healthcheck:
      test: ['CMD', 'node', '-e', "require('http').get('http://localhost:8080/health', (r) => process.exit(r.statusCode === 200 ? 0 : 1)).on('error', () => process.exit(1))"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 15s
    labels:
      - traefik.enable=true
      - traefik.http.routers.lidarr.rule=Host(`lidarr.lilnas.io`)
      - traefik.http.routers.lidarr.entrypoints=websecure
      - traefik.http.routers.lidarr.tls.certresolver=le
      - traefik.http.services.lidarr.loadbalancer.server.port=8080
