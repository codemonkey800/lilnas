services:
  theater:
    build:
      context: ../..
      dockerfile: apps/theater/Dockerfile
    restart: unless-stopped
    env_file:
      - .env.prod
    labels:
      - traefik.enable=true
      - traefik.http.routers.theater.rule=Host(`theater.lilnas.io`)
      - traefik.http.routers.theater.entrypoints=websecure
      - traefik.http.routers.theater.tls.certresolver=le
      - traefik.http.services.theater.loadbalancer.server.port=8080
