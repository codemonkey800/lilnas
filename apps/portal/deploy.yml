services:
  portal:
    build:
      context: ../..
      dockerfile: apps/portal/Dockerfile
    restart: unless-stopped
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
    labels:
      - traefik.enable=true
      - traefik.http.routers.portal.rule=Host(`portal.lilnas.io`)
      - traefik.http.routers.portal.entrypoints=websecure
      - traefik.http.routers.portal.tls.certresolver=le
      - traefik.http.routers.portal.middlewares=forward-auth
      - traefik.http.services.portal.loadbalancer.server.port=8080
