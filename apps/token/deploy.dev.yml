services:
  token:
    image: lilnas-dev
    command: -c "pnpm --filter=token dev"
    restart: unless-stopped
    environment:
      POSTGRES_HOST: token-db
      BACKEND_PORT: '8081'
    env_file:
      - ../../infra/.env.token
    depends_on:
      token-db:
        condition: service_healthy
    volumes:
      - ../../:/source
    labels:
      - traefik.enable=true
      - traefik.http.routers.token.rule=Host(`token.localhost`)
      - traefik.http.services.token.loadbalancer.server.port=8080
      # Public validation endpoint — no auth in dev
      - traefik.http.routers.token-public.rule=Host(`token.localhost`) && PathPrefix(`/public/`)
      - traefik.http.routers.token-public.priority=10

  token-db:
    image: postgres:17-alpine
    env_file:
      - ../../infra/.env.token
    volumes:
      - ./data/token-db:/var/lib/postgresql/data
    healthcheck:
      test: pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    restart: unless-stopped
