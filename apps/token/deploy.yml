services:
  token-db:
    image: postgres:17-alpine
    shm_size: 256m
    environment:
      POSTGRES_INITDB_ARGS: '--data-checksums'
    env_file:
      - ../../infra/.env.token
    volumes:
      - /storage/app-data/token-db:/var/lib/postgresql/data
    healthcheck:
      test: pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB
      interval: 30s
      timeout: 5s
      retries: 5
      start_interval: 10s
      start_period: 30s
    command:
      - postgres
      - -c
      - shared_buffers=256MB
      - -c
      - wal_compression=on
    restart: unless-stopped

  token:
    build:
      context: ../../
      dockerfile: apps/token/Dockerfile
    restart: unless-stopped
    environment:
      POSTGRES_HOST: token-db
      BACKEND_PORT: '8081'
      NODE_ENV: production
    env_file:
      - ../../infra/.env.token
    depends_on:
      token-db:
        condition: service_healthy
    labels:
      - traefik.enable=true
      # Internal router — UI and CRUD API, protected by forward-auth
      - traefik.http.routers.token.rule=Host(`token.lilnas.io`)
      - traefik.http.routers.token.entrypoints=websecure
      - traefik.http.routers.token.tls.certresolver=le
      - traefik.http.routers.token.middlewares=forward-auth
      - traefik.http.services.token.loadbalancer.server.port=8080
      # Public router — /public/* validation endpoint, no auth
      - traefik.http.routers.token-public.rule=Host(`token.lilnas.io`) && PathPrefix(`/public/`)
      - traefik.http.routers.token-public.entrypoints=websecure
      - traefik.http.routers.token-public.tls.certresolver=le
      - traefik.http.routers.token-public.priority=10
