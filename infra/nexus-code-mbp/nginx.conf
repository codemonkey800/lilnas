server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;

    error_page 502 503 504 /unreachable.html;
    location = /unreachable.html {
        internal;
    }

    # Container healthcheck target -- answered by nginx itself so the
    # container stays healthy (serving /unreachable.html) even when the
    # MacBook dev server is down.
    location = /nginx-health {
        access_log off;
        return 200 "ok\n";
        add_header Content-Type text/plain;
    }

    location / {
        proxy_pass http://host.docker.internal:5173;
        proxy_http_version 1.1;
        # WebSocket / Vite HMR upgrade support.
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}
