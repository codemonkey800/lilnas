services:
  nexus-code-mbp:
    image: nginx:alpine
    restart: unless-stopped
    entrypoint: ['/bin/sh', '/local-proxy/entrypoint.sh']
    command: ['nginx', '-g', 'daemon off;']
    networks:
      - lilnas-proxy
    extra_hosts:
      - 'host.docker.internal:host-gateway'
    environment:
      LOCAL_PORT: '5173'
      SERVICE_LABEL: 'nexus-code'
      UNREACHABLE_DESCRIPTION: 'The nexus-code dev server on the MacBook is unreachable. Start it and refresh.'
      NGINX_ENVSUBST_TEMPLATE_VARS: LOCAL_PORT
    volumes:
      - ./local-proxy/entrypoint.sh:/local-proxy/entrypoint.sh:ro
      - ./local-proxy/nginx.conf.template:/etc/nginx/templates/default.conf.template:ro
      - ./local-proxy/unreachable.html.template:/local-proxy/unreachable.html.template:ro
    healthcheck:
      test: ['CMD', 'wget', '-q', '-O', '/dev/null', 'http://127.0.0.1/nginx-health']
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
    labels:
      - traefik.enable=true
      - traefik.docker.network=lilnas-proxy
      - traefik.http.routers.nexus-code-mbp.rule=Host(`nexus-code-mbp.lilnas.io`)
      - traefik.http.routers.nexus-code-mbp.entrypoints=websecure
      - traefik.http.routers.nexus-code-mbp.tls=true
      - traefik.http.routers.nexus-code-mbp.middlewares=forward-auth
      - traefik.http.services.nexus-code-mbp.loadbalancer.server.port=80

networks:
  lilnas-proxy:
    external: true
